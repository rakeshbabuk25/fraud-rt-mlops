services:
  postgres:
    image: postgres:16
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.14.3
    container_name: fraud_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"
    command: >
      sh -c "
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      "
    volumes:
      - mlflowdata:/mlflow

  fraud_api:
    build:
      context: ./src/serving
    container_name: fraud_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fraud_db
      DB_USER: fraud
      DB_PASSWORD: fraud
      MODEL_NAME: baseline_rule
      MODEL_VERSION: "0"
      THRESHOLD: "0.5"
    ports:
      - "8000:8000"

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: fraud_redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  stream_worker:
    image: python:3.13-slim
    container_name: fraud_stream_worker
    depends_on:
      redpanda:
        condition: service_started
      fraud_api:
        condition: service_started
    working_dir: /work
    volumes:
      - ./src/streaming:/work
    command: sh -c "pip install --no-cache-dir -r requirements.txt && tail -f /dev/null"

volumes:
  pgdata:
  mlflowdata:
